# ESPHome: outdoor ESP32 + HiLink LD2410 mmWave → Home Assistant.
# secrets: api_encryption_key_mm_outdoor (see secrets.yaml.example)
# Build / flash: esphome compile dog_door_mmwave_outdoor.yaml
#
# Wiring / mount: same as dog_door_mmwave.yaml (GPIO17/16 @ 256000). Aim boresight into approach
# zone; tune gates/thresholds in HA. Weather enclosure if exposed.

substitutions:
  name: dog-door-mm-outdoor
  friendly_name: Dog door mmWave outdoor

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: "2024.6.0"

esp32:
  variant: esp32
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key_mm_outdoor

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

uart:
  id: uart_ld2410
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 256000

ld2410:
  id: ld2410_radar
  uart_id: uart_ld2410

binary_sensor:
  - platform: ld2410
    has_target:
      name: "Outdoor mmWave target"
    has_moving_target:
      name: "Outdoor mmWave moving"
    has_still_target:
      name: "Outdoor mmWave still"

sensor:
  - platform: ld2410
    moving_distance:
      name: "Outdoor mmWave moving distance"
    still_distance:
      name: "Outdoor mmWave still distance"
    moving_energy:
      name: "Outdoor mmWave move energy"
    still_energy:
      name: "Outdoor mmWave still energy"
    detection_distance:
      name: "Outdoor mmWave detection distance"
    g0:
      move_energy:
        name: "Outdoor mmWave G0 move energy"
      still_energy:
        name: "Outdoor mmWave G0 still energy"
    g1:
      move_energy:
        name: "Outdoor mmWave G1 move energy"
      still_energy:
        name: "Outdoor mmWave G1 still energy"
    g2:
      move_energy:
        name: "Outdoor mmWave G2 move energy"
      still_energy:
        name: "Outdoor mmWave G2 still energy"
    g3:
      move_energy:
        name: "Outdoor mmWave G3 move energy"
      still_energy:
        name: "Outdoor mmWave G3 still energy"
    g4:
      move_energy:
        name: "Outdoor mmWave G4 move energy"
      still_energy:
        name: "Outdoor mmWave G4 still energy"
    g5:
      move_energy:
        name: "Outdoor mmWave G5 move energy"
      still_energy:
        name: "Outdoor mmWave G5 still energy"
    g6:
      move_energy:
        name: "Outdoor mmWave G6 move energy"
      still_energy:
        name: "Outdoor mmWave G6 still energy"
    g7:
      move_energy:
        name: "Outdoor mmWave G7 move energy"
      still_energy:
        name: "Outdoor mmWave G7 still energy"
    g8:
      move_energy:
        name: "Outdoor mmWave G8 move energy"
      still_energy:
        name: "Outdoor mmWave G8 still energy"
  - platform: wifi_signal
    name: "Outdoor mmWave WiFi signal"
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: "Outdoor mmWave uptime"
    entity_category: diagnostic

number:
  - platform: ld2410
    timeout:
      name: "Outdoor mmWave timeout"
    light_threshold:
      name: "Outdoor mmWave light threshold"
    max_move_distance_gate:
      name: "Outdoor mmWave max move distance gate"
    max_still_distance_gate:
      name: "Outdoor mmWave max still distance gate"
    g0:
      move_threshold:
        name: "Outdoor mmWave G0 move threshold"
      still_threshold:
        name: "Outdoor mmWave G0 still threshold"
    g1:
      move_threshold:
        name: "Outdoor mmWave G1 move threshold"
      still_threshold:
        name: "Outdoor mmWave G1 still threshold"
    g2:
      move_threshold:
        name: "Outdoor mmWave G2 move threshold"
      still_threshold:
        name: "Outdoor mmWave G2 still threshold"
    g3:
      move_threshold:
        name: "Outdoor mmWave G3 move threshold"
      still_threshold:
        name: "Outdoor mmWave G3 still threshold"
    g4:
      move_threshold:
        name: "Outdoor mmWave G4 move threshold"
      still_threshold:
        name: "Outdoor mmWave G4 still threshold"
    g5:
      move_threshold:
        name: "Outdoor mmWave G5 move threshold"
      still_threshold:
        name: "Outdoor mmWave G5 still threshold"
    g6:
      move_threshold:
        name: "Outdoor mmWave G6 move threshold"
      still_threshold:
        name: "Outdoor mmWave G6 still threshold"
    g7:
      move_threshold:
        name: "Outdoor mmWave G7 move threshold"
      still_threshold:
        name: "Outdoor mmWave G7 still threshold"
    g8:
      move_threshold:
        name: "Outdoor mmWave G8 move threshold"
      still_threshold:
        name: "Outdoor mmWave G8 still threshold"

select:
  - platform: ld2410
    distance_resolution:
      name: "Outdoor mmWave distance resolution"
    light_function:
      name: "Outdoor mmWave light function"
    out_pin_level:
      name: "Outdoor mmWave out pin level"

switch:
  - platform: ld2410
    engineering_mode:
      name: "Outdoor mmWave engineering mode"
    bluetooth:
      name: "Outdoor mmWave bluetooth"
  - platform: restart
    name: "Outdoor mmWave restart"
    entity_category: config

button:
  - platform: ld2410
    factory_reset:
      name: "Outdoor mmWave factory reset"
    restart:
      name: "Outdoor mmWave radar restart"
    query_params:
      name: "Outdoor mmWave query params"

text_sensor:
  - platform: ld2410
    version:
      name: "Outdoor mmWave firmware version"
    mac_address:
      name: "Outdoor mmWave MAC address"

# Indoor: dog_door_mmwave.yaml. Uno bridge: dog_door_uno_bridge.yaml
